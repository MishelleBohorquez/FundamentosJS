<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Mishelle</title>
</head>

<body>

    <div id="app">
        <h1>Dev Score Card 🧑‍💻</h1>
        <p>Descubre cuál es tu perfil como desarrollador</p>
        <div id="formulario">
            <label>¿Cuál es tu nombre?</label>
            <input type="text" id="nombreUsuario" placeholder="Tu nombre aquí">
            <p>¿Qué tecnologías manejas? (selecciona todas las que apliquen)</p>
            <input type="checkbox" id="html" value="10"> HTML/CSS<br>
            <input type="checkbox" id="js" value="25"> JavaScript<br>
            <input type="checkbox" id="java" value="30"> Java<br>
            <input type="checkbox" id="git" value="20"> Git/GitHub<br>
            <input type="checkbox" id="sql" value="15"> SQL<br>
            <br>
            <button id="btnCalcular">Calcular mi Score</button>
        </div>
        <div id="resultado" style="display:none">
            <h2 id="mensajePrincipal"></h2>
            <p id="subMensaje"></p>
            <p id="puntaje"></p>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
